<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keep Run Generator</title>
    <style>
        :root {
            --bg-top: #0a0a0a;
            --bg-bottom: #05070c;
            --panel: rgba(6, 14, 24, var(--opacity-panel));
            --panel-border: rgba(0, 217, 255, 0.2);
            --ink: #f5fbff;
            --muted: #8ca5b8;
            --accent: #00d9ff;
            --accent-deep: #48f0ff;
            --accent-soft: rgba(0, 217, 255, 0.12);
            --warm: #64e8ff;
            --shadow: 0 28px 90px rgba(0, 217, 255, var(--opacity-shadow)), 0 0 0 1px rgba(255, 255, 255, 0.03);
            --opacity-overlay: 1;
            --opacity-grid: 0.33;
            --opacity-panel: 0;
            --opacity-glow: 0.35;
            --opacity-shadow: 0.37;
            --opacity-card: 0.83;
            --opacity-input: 0.95;
            --opacity-preview: 0.15;
            --frost-blur: 11px;
            --radius-xl: 30px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            min-height: 100%;
            color: var(--ink);
            color-scheme: dark;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "SF Pro Display", "Helvetica Neue", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 20% 12%, rgba(0, 217, 255, 0.18), transparent 32%),
                radial-gradient(circle at 78% 18%, rgba(255, 255, 255, 0.07), transparent 24%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        body {
            overflow: hidden;
        }

        body[data-theme="light"] {
            --bg-top: #eef8ff;
            --bg-bottom: #fbfdff;
            --panel: rgba(255, 255, 255, var(--opacity-panel));
            --panel-border: rgba(0, 137, 205, 0.22);
            --ink: #071a27;
            --muted: #5f7483;
            --accent: #008ce8;
            --accent-deep: #00bde8;
            --accent-soft: rgba(0, 140, 232, 0.1);
            --warm: #00a8d8;
            --shadow: 0 26px 80px rgba(20, 96, 130, var(--opacity-shadow)), 0 0 0 1px rgba(0, 115, 170, 0.04);
            color-scheme: light;
            background:
                radial-gradient(circle at 20% 10%, rgba(0, 217, 255, 0.18), transparent 30%),
                radial-gradient(circle at 82% 16%, rgba(255, 255, 255, 0.9), transparent 24%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
        }

        body::before {
            position: fixed;
            inset: 0;
            pointer-events: none;
            content: "";
            background-image:
                linear-gradient(rgba(0, 217, 255, 0.075) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 217, 255, 0.075) 1px, transparent 1px);
            background-size: 42px 42px;
            mask-image: radial-gradient(circle at center, black 34%, transparent 86%);
            opacity: var(--opacity-grid);
            z-index: 0;
        }

        body::after {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            content: "";
            background:
                radial-gradient(circle at 50% 30%, rgba(0, 217, 255, 0.08), transparent 36%),
                rgba(0, 0, 0, var(--opacity-overlay));
        }

        body[data-theme="light"]::before {
            background-image:
                linear-gradient(rgba(0, 128, 190, 0.095) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 128, 190, 0.095) 1px, transparent 1px);
            opacity: var(--opacity-grid);
        }

        body[data-theme="light"]::after {
            background:
                radial-gradient(circle at 48% 28%, rgba(0, 217, 255, 0.13), transparent 34%),
                rgba(255, 255, 255, var(--opacity-overlay));
        }

        #particleCanvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
        }

        .page {
            position: relative;
            z-index: 1;
            height: 100vh;
            padding: 22px 28px;
            overflow: hidden;
        }

        .mode-toggle-row {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .mode-toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 132px;
            height: 40px;
            padding: 4px;
            border: 1px solid rgba(0, 217, 255, 0.18);
            border-radius: 999px;
            color: #dffaff;
            background: rgba(0, 217, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 18px rgba(0, 217, 255, 0.12);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.02em;
            overflow: hidden;
        }

        .mode-toggle::before {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: 30px;
            border-radius: 999px;
            content: "";
            background: linear-gradient(180deg, #ffffff, #00d9ff);
            box-shadow: 0 0 18px rgba(0, 217, 255, 0.52);
            transition: transform 0.24s ease;
        }

        body[data-ui-mode="particle"] .mode-toggle::before {
            transform: translateX(64px);
        }

        .mode-option {
            position: relative;
            z-index: 1;
            flex: 1;
            display: grid;
            place-items: center;
            height: 30px;
            color: rgba(255, 255, 255, 0.7);
            transition: color 0.2s ease;
        }

        body[data-ui-mode="simple"] .mode-option:first-child,
        body[data-ui-mode="particle"] .mode-option:last-child {
            color: #061520;
        }

        body[data-theme="light"] .mode-toggle {
            color: #073047;
            background: rgba(255, 255, 255, 0.76);
            border-color: rgba(0, 128, 190, 0.2);
            box-shadow: 0 10px 28px rgba(0, 108, 160, 0.12);
        }

        body[data-theme="light"] .mode-option {
            color: rgba(7, 48, 71, 0.58);
        }

        body[data-theme="light"][data-ui-mode="simple"] .mode-option:first-child,
        body[data-theme="light"][data-ui-mode="particle"] .mode-option:last-child {
            color: #073047;
        }

        .theme-toggle {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            height: 44px;
            padding: 7px;
            border: 1px solid rgba(0, 217, 255, 0.18);
            border-radius: 999px;
            color: #dffaff;
            background: rgba(0, 217, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06), 0 0 18px rgba(0, 217, 255, 0.12);
        }

        .theme-icons {
            position: relative;
            display: inline-grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px;
            width: 56px;
            height: 28px;
            padding: 2px;
            border-radius: 999px;
            background: rgba(1, 8, 15, 0.72);
        }

        .theme-icons::before {
            position: absolute;
            top: 3px;
            left: 29px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            content: "";
            background: linear-gradient(180deg, #ffffff, #00d9ff);
            box-shadow: 0 0 18px rgba(0, 217, 255, 0.64);
            transition: transform 0.22s ease;
        }

        .theme-icon {
            position: relative;
            z-index: 1;
            display: grid;
            place-items: center;
            width: 24px;
            height: 24px;
            color: rgba(255, 255, 255, 0.76);
            line-height: 1;
        }

        .theme-label {
            display: none;
        }

        body[data-theme="light"] .theme-icons::before {
            transform: translateX(-26px);
        }

        body[data-theme="light"] .theme-toggle {
            color: #073047;
            background: rgba(255, 255, 255, 0.76);
            border-color: rgba(0, 128, 190, 0.2);
            box-shadow: 0 10px 28px rgba(0, 108, 160, 0.12);
        }

        body[data-theme="light"] .theme-icons {
            background: rgba(0, 127, 190, 0.1);
        }

        body[data-theme="light"] .theme-icon {
            color: rgba(7, 48, 71, 0.72);
        }

        .layout {
            max-width: 1660px;
            height: 100%;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: minmax(340px, 460px) minmax(520px, 1fr);
            gap: 24px;
            align-items: stretch;
            min-height: 0;
        }

        .panel {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0)),
                var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            -webkit-backdrop-filter: blur(var(--frost-blur)) saturate(1.18);
            backdrop-filter: blur(var(--frost-blur)) saturate(1.18);
        }

        .panel::before {
            position: absolute;
            inset: 0;
            pointer-events: none;
            content: "";
            border-radius: inherit;
            background:
                radial-gradient(circle at 18% 0%, rgba(0, 217, 255, 0.16), transparent 28%),
                radial-gradient(circle at 92% 18%, rgba(255, 255, 255, 0.08), transparent 24%);
            opacity: var(--opacity-glow);
        }

        .panel > * {
            position: relative;
            z-index: 1;
        }

        .sidebar {
            min-height: 0;
            height: 100%;
            overflow-y: auto;
            overscroll-behavior: contain;
            padding: 26px;
            scrollbar-width: none;
        }

        .sidebar::-webkit-scrollbar,
        .phone-stage::-webkit-scrollbar {
            display: none;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
            margin-bottom: 24px;
        }

        .summary-card {
            padding: 16px;
            border-radius: 20px;
            background:
                linear-gradient(180deg, rgba(0, 217, 255, 0.08), rgba(7, 17, 29, var(--opacity-card))),
                rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 217, 255, 0.15);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 12px 28px rgba(0, 0, 0, 0.22);
        }

        .summary-card span {
            display: block;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.02em;
            margin-bottom: 8px;
        }

        .summary-card strong {
            display: block;
            font-size: 26px;
            line-height: 1;
            letter-spacing: -0.04em;
            color: #f7feff;
            text-shadow: 0 0 16px rgba(0, 217, 255, 0.26);
        }

        .section {
            margin-top: 22px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 217, 255, 0.12);
        }

        .section:first-of-type {
            margin-top: 0;
            padding-top: 0;
            border-top: 0;
        }

        .section-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .section-title h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: -0.02em;
        }

        .section-title span {
            color: var(--muted);
            font-size: 12px;
        }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .grid-2 {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .grid-3 {
            grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .field {
            display: grid;
            gap: 8px;
        }

        .auto-calc-grid {
            align-items: start;
        }

        .auto-calc-grid .field {
            grid-template-rows: 18px 48px minmax(36px, auto);
        }

        .auto-calc-grid .field label {
            display: flex;
            align-items: center;
        }

        .auto-calc-grid .field input {
            height: 48px;
        }

        .auto-calc-grid .field-hint {
            min-height: 36px;
        }

        .field label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
        }

        .field input,
        .field select,
        .field textarea,
        .field button.file-trigger {
            width: 100%;
            border: 1px solid rgba(0, 217, 255, 0.16);
            border-radius: var(--radius-md);
            background: rgba(3, 10, 18, var(--opacity-input));
            color: var(--ink);
            padding: 13px 14px;
            font: inherit;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;
        }

        .field input::placeholder,
        .field textarea::placeholder {
            color: rgba(140, 165, 184, 0.72);
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            outline: none;
            border-color: rgba(0, 217, 255, 0.82);
            box-shadow: 0 0 0 4px rgba(0, 217, 255, 0.14), 0 0 28px rgba(0, 217, 255, 0.12);
        }

        .field textarea {
            min-height: 84px;
            resize: vertical;
        }

        .media-field {
            grid-template-rows: auto auto 1fr;
            align-content: start;
        }

        .field-hint,
        .media-status {
            font-size: 12px;
            color: var(--muted);
            line-height: 1.5;
        }

        .toggle-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 18px;
            background: rgba(3, 10, 18, var(--opacity-input));
            border: 1px solid rgba(0, 217, 255, 0.16);
        }

        .toggle-copy {
            display: grid;
            gap: 4px;
        }

        .toggle-copy strong {
            font-size: 14px;
        }

        .toggle-copy span {
            color: var(--muted);
            font-size: 12px;
        }

        .switch {
            position: relative;
            width: 54px;
            height: 32px;
            display: inline-block;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .slider::before {
            position: absolute;
            left: 4px;
            top: 4px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #fff;
            content: "";
            box-shadow: 0 4px 16px rgba(0, 217, 255, 0.28);
            transition: transform 0.2s ease;
        }

        .switch input:checked + .slider {
            background: linear-gradient(180deg, #7af7ff, #00a8ff);
        }

        .switch input:checked + .slider::before {
            transform: translateX(22px);
        }

        .media-input {
            position: relative;
            overflow: hidden;
        }

        .media-input input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .media-input .file-shell {
            min-height: 104px;
            padding: 13px 14px;
            border: 1px dashed rgba(0, 217, 255, 0.26);
            border-radius: var(--radius-md);
            background: rgba(3, 10, 18, var(--opacity-input));
            color: var(--ink);
            display: grid;
            gap: 4px;
            align-content: center;
        }

        .media-input strong {
            font-size: 14px;
        }

        .media-input span {
            font-size: 12px;
            color: var(--muted);
        }

        .media-edit-button {
            align-self: end;
            min-height: 48px;
            padding: 10px 12px;
            border-radius: 14px;
            font-size: 13px;
        }

        .media-edit-button.placeholder {
            visibility: hidden;
            pointer-events: none;
        }

        .media-edit-button[hidden]:not(.placeholder) {
            display: none;
        }

        .opacity-controls {
            display: grid;
            gap: 12px;
        }

        .opacity-row {
            display: grid;
            grid-template-columns: 84px minmax(0, 1fr) 46px;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 18px;
            background: rgba(3, 10, 18, var(--opacity-input));
            border: 1px solid rgba(0, 217, 255, 0.14);
        }

        .opacity-row label {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .opacity-row input[type="range"] {
            width: 100%;
            padding: 0;
            accent-color: var(--accent);
        }

        .opacity-value {
            color: var(--ink);
            font-size: 12px;
            font-weight: 800;
            text-align: right;
        }

        .opacity-actions {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 8px;
        }

        .opacity-actions .btn {
            padding: 10px 12px;
            border-radius: 14px;
            font-size: 13px;
        }

        .settings-toggle {
            justify-self: end;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 58px;
            height: 36px;
            padding: 0 12px;
            border-radius: 999px;
            color: var(--ink);
            background: rgba(3, 10, 18, var(--opacity-input));
            border: 1px solid rgba(0, 217, 255, 0.18);
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
            font-weight: 800;
            user-select: none;
        }

        .settings-panel {
            grid-column: 1 / -1;
            justify-self: center;
            width: min(100%, 520px);
            display: grid;
            gap: 14px;
            margin: 12px auto 0;
            padding: 16px;
            border-radius: 22px;
            background: rgba(6, 14, 24, 0.94);
            border: 1px solid rgba(0, 217, 255, 0.18);
            box-shadow: 0 18px 54px rgba(0, 0, 0, 0.24);
        }

        .settings-panel[hidden] {
            display: none;
        }

        body[data-theme="light"] .settings-panel {
            background: rgba(255, 255, 255, 0.96);
            border-color: rgba(0, 128, 190, 0.18);
            box-shadow: 0 18px 54px rgba(27, 91, 126, 0.12);
        }

        .button-row {
            position: sticky;
            bottom: -1px;
            z-index: 2;
            display: grid;
            gap: 10px;
            margin-top: 24px;
            padding: 16px 0 4px;
            background: linear-gradient(180deg, rgba(6, 14, 24, 0), rgba(6, 14, 24, 0.92) 22%, rgba(6, 14, 24, 0.98));
            backdrop-filter: blur(12px);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
        }

        button {
            border: 0;
            cursor: pointer;
            font: inherit;
        }

        .btn {
            padding: 14px 16px;
            border-radius: 18px;
            font-weight: 700;
            letter-spacing: -0.02em;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.2s ease, border-color 0.2s ease;
        }

        .btn::after {
            position: absolute;
            inset: 0;
            pointer-events: none;
            content: "";
            background: linear-gradient(110deg, transparent, rgba(255, 255, 255, 0.18), transparent);
            transform: translateX(-120%);
            transition: transform 0.42s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn:hover::after {
            transform: translateX(120%);
        }

        .btn-primary {
            color: #fff;
            background: linear-gradient(180deg, #00d9ff, #006dff);
            box-shadow: 0 14px 34px rgba(0, 217, 255, 0.28);
        }

        .btn-secondary {
            color: var(--ink);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(0, 217, 255, 0.16);
        }

        .btn-soft {
            color: var(--accent-deep);
            background: var(--accent-soft);
        }

        .btn-ghost {
            color: #b9f6ff;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.12);
        }

        .status-message {
            min-height: 22px;
            margin: 14px 2px 0;
            font-size: 13px;
            color: var(--muted);
        }

        .status-message[data-tone="success"] {
            color: #6ef7ff;
        }

        .status-message[data-tone="error"] {
            color: #ff8f70;
        }

        .status-message[data-tone="warning"] {
            color: #ffd36a;
        }

        .preview-panel {
            padding: 18px;
            min-height: 0;
            height: 100%;
            overflow: hidden;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr);
        }

        .preview-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 2px 4px 14px;
        }

        .preview-head h2 {
            margin: 0;
            font-size: 18px;
            letter-spacing: -0.02em;
            text-transform: uppercase;
        }

        .preview-head p {
            margin: 0;
            color: var(--muted);
            font-size: 13px;
        }

        .preview-actions {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .preview-actions .btn {
            padding: 10px 14px;
            border-radius: 999px;
            white-space: nowrap;
        }

        .phone-stage {
            padding: 16px;
            border-radius: 28px;
            background:
                radial-gradient(circle at top, rgba(0, 217, 255, 0.16), transparent 24%),
                radial-gradient(circle at 80% 20%, rgba(255, 255, 255, 0.07), transparent 28%),
                linear-gradient(180deg, rgba(3, 12, 22, var(--opacity-preview)), rgba(2, 8, 14, var(--opacity-preview)));
            border: 1px solid rgba(0, 217, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            min-height: 0;
            scrollbar-width: none;
        }

        .phone-frame {
            flex: 0 0 auto;
            height: 100%;
            max-width: 100%;
            aspect-ratio: 852 / 1847;
            padding: 0;
            border-radius: 34px;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(0, 217, 255, 0.18), rgba(255, 255, 255, 0.04)),
                linear-gradient(180deg, #223443, #09101a);
            box-shadow:
                inset 0 1px 1px rgba(255, 255, 255, 0.22),
                0 30px 60px rgba(0, 0, 0, 0.46),
                0 0 0 1px rgba(0, 217, 255, 0.18),
                0 0 54px rgba(0, 217, 255, 0.16);
        }

        #previewCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border-radius: 0;
            background: #fff;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.42);
        }

        body[data-theme="light"] .panel {
            background:
                linear-gradient(180deg, rgba(255, 255, 255, var(--opacity-panel)), rgba(255, 255, 255, var(--opacity-panel))),
                var(--panel);

            detailLine: { x: 108, y: 343, width: 635, height: 36 },
            distance: { x: 24, y: 500, width: 440, height: 122 },
            pbBadge: { x: 582, y: 466, width: 238, height: 178 },
            pbRibbon: { x: 630, y: 604, width: 150, height: 36, fill: "#e0ac58" },
            map: { x: 31, y: 657, width: 790, height: 516 }
        };

        let state = restoreState();
        let canvas;
        let ctx;
        let debouncedRefresh;
        const imageCache = {
            avatar: null,
            map: null,
            template: null,
            templateExportSafe: false
        };

        const cropEditor = {
            canvas: null,
            ctx: null,
            image: null,
            x: 0,
            y: 0,
            scale: 1,
            minScale: 1,
            maxScale: 4,
            frameX: 100,
            frameY: 100,
            frameSize: 440,
            dragging: false,
            lastX: 0,
            lastY: 0,
            resolve: null
        };

        const dom = {};

        document.addEventListener("DOMContentLoaded", init);

        function init() {
            bindDom();
            applyTheme(state.theme);
            applyUiOpacity(state);
            updateModeToggle(state);
            initParticleBackground();
            canvas = dom.previewCanvas;
            ctx = canvas.getContext("2d");
            debouncedRefresh = debounce(() => refreshAll({ persist: true }), 300);

            populateForm(state);
            bindEvents();
            updateMediaStatus();

            Promise.all([
                loadStaticTemplateImage(),
                setCachedImage("avatar", state.avatarDataUrl),
                setCachedImage("map", state.mapDataUrl)
            ]).finally(() => {
                refreshAll({ persist: false, silentIfEmpty: true });
            });
        }

        function bindDom() {
            dom.form = document.getElementById("controlForm");
            dom.previewCanvas = document.getElementById("previewCanvas");
            dom.previewButton = document.getElementById("previewButton");
            dom.exportButton = document.getElementById("exportButton");
            dom.resetButton = document.getElementById("resetButton");
            dom.avatarInput = document.getElementById("avatarInput");
            dom.mapInput = document.getElementById("mapInput");
            dom.avatarStatus = document.getElementById("avatarStatus");
            dom.mapStatus = document.getElementById("mapStatus");
            dom.avatarEditButton = document.getElementById("avatarEditButton");
            dom.avatarCropModal = document.getElementById("avatarCropModal");
            dom.avatarCropStage = document.getElementById("avatarCropStage");
            dom.avatarCropCanvas = document.getElementById("avatarCropCanvas");
            dom.avatarCropZoom = document.getElementById("avatarCropZoom");
            dom.avatarCropClose = document.getElementById("avatarCropClose");
            dom.avatarCropCancel = document.getElementById("avatarCropCancel");
            dom.avatarCropApply = document.getElementById("avatarCropApply");
            dom.themeToggleButton = document.getElementById("themeToggleButton");
            dom.themeToggleLabel = document.getElementById("themeToggleLabel");
            dom.modeToggleButton = document.getElementById("modeToggleButton");
            dom.settingsToggleButton = document.getElementById("settingsToggleButton");
            dom.settingsPanel = document.getElementById("settingsPanel");
            dom.opacityClearButton = document.getElementById("opacityClearButton");
            dom.opacityReadableButton = document.getElementById("opacityReadableButton");
            dom.opacityResetButton = document.getElementById("opacityResetButton");
            dom.statusMessage = document.getElementById("statusMessage");
            dom.summaryPace = document.getElementById("summaryPace");
            dom.summaryCalories = document.getElementById("summaryCalories");
            dom.summaryEndTime = document.getElementById("summaryEndTime");
            dom.summarySteps = document.getElementById("summarySteps");
            UI_TUNING_FIELDS.forEach((key) => {
                dom[key] = document.getElementById(key);
                dom[`${key}Value`] = document.getElementById(`${key}Value`);
            });
        }

        function bindEvents() {
            dom.form.addEventListener("input", (event) => {
                const target = event.target;
                if (!target.name || target.type === "file" || target.type === "checkbox") {
                    return;
                }
                if (UI_TUNING_FIELDS.includes(target.name)) {
                    refreshAll({ persist: true });
                    return;
                }
                debouncedRefresh();
            });

            dom.form.addEventListener("change", async (event) => {
                const target = event.target;
                if (!target.name) {
                    return;
                }
                if (target.type === "file") {
                    await handleFileChange(target);
                    return;
                }
                refreshAll({ persist: true });
            });

            UI_TUNING_FIELDS.forEach((key) => {
                dom[key]?.addEventListener("input", () => refreshAll({ persist: true }));
            });

            dom.previewButton.addEventListener("click", () => {
                refreshAll({ persist: true });
            });

            dom.exportButton.addEventListener("click", exportPng);
            dom.resetButton.addEventListener("click", resetState);
            dom.themeToggleButton.addEventListener("click", toggleTheme);
            dom.modeToggleButton.addEventListener("click", toggleParticleMode);
            dom.settingsToggleButton.addEventListener("click", toggleSettingsPanel);
            dom.avatarEditButton.addEventListener("click", editCurrentAvatar);
            dom.avatarCropClose.addEventListener("click", () => closeAvatarCropper(null));
            dom.avatarCropCancel.addEventListener("click", () => closeAvatarCropper(null));
            dom.avatarCropApply.addEventListener("click", applyAvatarCrop);
            dom.avatarCropZoom.addEventListener("input", handleAvatarCropZoom);
            dom.avatarCropStage.addEventListener("pointerdown", startAvatarCropDrag);
            dom.avatarCropStage.addEventListener("pointermove", moveAvatarCropDrag);
            dom.avatarCropStage.addEventListener("pointerup", endAvatarCropDrag);
            dom.avatarCropStage.addEventListener("pointercancel", endAvatarCropDrag);
            dom.avatarCropStage.addEventListener("wheel", handleAvatarCropWheel, { passive: false });
            dom.opacityClearButton.addEventListener("click", () => adjustOpacityPreset("clear"));
            dom.opacityReadableButton.addEventListener("click", () => adjustOpacityPreset("readable"));
            dom.opacityResetButton.addEventListener("click", () => adjustOpacityPreset("reset"));
        }

        function populateForm(nextState) {
            const fields = {
                nickname: nextState.nickname,
                runDate: nextState.runDate,
                startTime: nextState.startTime,
                durationHours: String(nextState.durationHours),
                durationMinutes: String(nextState.durationMinutes),
                durationSeconds: String(nextState.durationSeconds),
                distance: formatEditableNumber(nextState.distance, 2),
                city: nextState.city,
                weather: nextState.weather,
                temperature: String(nextState.temperature),
                weight: formatEditableNumber(nextState.weight, 1),
                cadence: String(nextState.cadence),
                trainingLoad: String(nextState.trainingLoad),
                averageHeartRate: String(nextState.averageHeartRate),
                pbAchievementText: nextState.pbAchievementText,
                noticeText: nextState.noticeText,
                avatarZoom: String(nextState.avatarZoom),
                avatarOffsetX: String(nextState.avatarOffsetX),
                avatarOffsetY: String(nextState.avatarOffsetY),
                opacityOverlay: String(nextState.opacityOverlay),
                opacityGrid: String(nextState.opacityGrid),
                opacityPanel: String(nextState.opacityPanel),
                opacityGlow: String(nextState.opacityGlow),
                opacityShadow: String(nextState.opacityShadow),
                opacityCard: String(nextState.opacityCard),
                opacityInput: String(nextState.opacityInput),
                opacityPreview: String(nextState.opacityPreview),
                frostBlur: String(nextState.frostBlur),
                particleSensitivity: String(nextState.particleSensitivity)
            };

            Object.entries(fields).forEach(([key, value]) => {
                const element = document.getElementById(key);
                if (element) {
                    element.value = value;
                }
            });

            setCheckedIfPresent("showPB", !!nextState.showPB);
            setCheckedIfPresent("showNotice", !!nextState.showNotice);
            setCheckedIfPresent("useScreenshotTemplate", !!nextState.useScreenshotTemplate);
            updateModeToggle(nextState);
            updateOpacityLabels(nextState);
        }

        function setCheckedIfPresent(id, checked) {
            const element = document.getElementById(id);
            if (element) {
                element.checked = checked;
            }
        }

        function readStateFromForm(previousState) {
            return sanitizeState({
                ...previousState,
                nickname: document.getElementById("nickname").value,
                runDate: document.getElementById("runDate").value,
                startTime: document.getElementById("startTime").value,
                durationHours: document.getElementById("durationHours").value,
                durationMinutes: document.getElementById("durationMinutes").value,
                durationSeconds: document.getElementById("durationSeconds").value,
                distance: document.getElementById("distance").value,
                city: document.getElementById("city").value,
                weather: document.getElementById("weather").value,
                temperature: document.getElementById("temperature").value,
                weight: document.getElementById("weight").value,
                cadence: document.getElementById("cadence").value,
                trainingLoad: document.getElementById("trainingLoad").value,
                averageHeartRate: document.getElementById("averageHeartRate").value,
                showPB: false,
                pbAchievementText: "",
                showNotice: true,
                useScreenshotTemplate: true,
                uiMode: previousState.uiMode,
                particlesEnabled: previousState.particlesEnabled,
                noticeText: document.getElementById("noticeText").value,
                fontFamily: DEFAULT_STATE.fontFamily,
                avatarZoom: document.getElementById("avatarZoom")?.value ?? previousState.avatarZoom,
                avatarOffsetX: document.getElementById("avatarOffsetX")?.value ?? previousState.avatarOffsetX,
                avatarOffsetY: document.getElementById("avatarOffsetY")?.value ?? previousState.avatarOffsetY,
                opacityOverlay: document.getElementById("opacityOverlay").value,
                opacityGrid: document.getElementById("opacityGrid").value,
                opacityPanel: document.getElementById("opacityPanel").value,
                opacityGlow: document.getElementById("opacityGlow").value,
                opacityShadow: document.getElementById("opacityShadow").value,
                opacityCard: document.getElementById("opacityCard").value,
                opacityInput: document.getElementById("opacityInput").value,
                opacityPreview: document.getElementById("opacityPreview").value,
                frostBlur: document.getElementById("frostBlur").value,
                particleSensitivity: document.getElementById("particleSensitivity").value
            });
        }

        function refreshAll(options = {}) {
            state = readStateFromForm(state);
            applyUiOpacity(state);
            const derived = deriveState(state);
            updateSummary(derived);
            renderKeepScreen(state, derived);
            if (options.persist !== false) {
                persistState(state);
            }
            updateMediaStatus();

            if (options.message) {
                setStatus(options.message, options.tone || "success");
            } else if (!derived.isValid) {
                setStatus(derived.validationMessage, "warning");
            } else if (!options.silentIfEmpty) {
                setStatus("", "info");
            }
        }

        function updateSummary(derived) {
            dom.summaryPace.textContent = derived.pace;
            dom.summaryCalories.textContent = `${formatInteger(derived.calories)} 千卡`;
            dom.summaryEndTime.textContent = derived.timeRange;
            dom.summarySteps.textContent = `${formatInteger(derived.steps)} 步`;
        }

        async function handleFileChange(input) {
            const key = input.id === "avatarInput" ? "avatar" : "map";
            const stateKey = key === "avatar" ? "avatarDataUrl" : "mapDataUrl";
            const file = input.files && input.files[0];

            if (!file) {
                state[stateKey] = "";
                imageCache[key] = null;
                refreshAll({ persist: true, silentIfEmpty: true });
                return;
            }

            setStatus("");

            try {
                if (key === "avatar") {
                    const sourceDataUrl = await resizeImageFile(file, {
                        maxWidth: 1600,
                        maxHeight: 1600,
                        quality: 0.94
                    });
                    const croppedDataUrl = await openAvatarCropper(sourceDataUrl);
                    if (!croppedDataUrl) {
                        input.value = "";
                        setStatus("");
                        return;
                    }

                    state.avatarDataUrl = croppedDataUrl;
                    state.avatarZoom = DEFAULT_STATE.avatarZoom;
                    state.avatarOffsetX = DEFAULT_STATE.avatarOffsetX;
                    state.avatarOffsetY = DEFAULT_STATE.avatarOffsetY;
                    await setCachedImage("avatar", croppedDataUrl);
                    persistState(state);
                    refreshAll({ persist: false, silentIfEmpty: true });
                    return;
                }

                const resizedDataUrl = await resizeImageFile(file, key === "avatar" ? {
                    maxWidth: 320,
                    maxHeight: 320,
                    quality: 0.92
                } : {
                    maxWidth: 1440,
                    maxHeight: 900,
                    quality: 0.88
                });

                state[stateKey] = resizedDataUrl;
                if (key === "avatar") {
                    state.avatarZoom = DEFAULT_STATE.avatarZoom;
                    state.avatarOffsetX = DEFAULT_STATE.avatarOffsetX;
                    state.avatarOffsetY = DEFAULT_STATE.avatarOffsetY;
                    populateForm(state);
                }
                await setCachedImage(key, resizedDataUrl);
                persistState(state);
                refreshAll({ persist: false, silentIfEmpty: true });
            } catch (error) {
                console.error(error);
                setStatus("图片处理失败，请换一张图片重试。", "error");
            }
        }

        async function editCurrentAvatar() {
            if (!state.avatarDataUrl) {
                return;
            }
            const croppedDataUrl = await openAvatarCropper(state.avatarDataUrl);
            if (!croppedDataUrl) {
                return;
            }
            state.avatarDataUrl = croppedDataUrl;
            state.avatarZoom = DEFAULT_STATE.avatarZoom;
            state.avatarOffsetX = DEFAULT_STATE.avatarOffsetX;
            state.avatarOffsetY = DEFAULT_STATE.avatarOffsetY;
            await setCachedImage("avatar", croppedDataUrl);
            persistState(state);
            refreshAll({ persist: false, silentIfEmpty: true });
        }

        async function openAvatarCropper(dataUrl) {
            cropEditor.canvas = dom.avatarCropCanvas;
            cropEditor.ctx = cropEditor.canvas.getContext("2d");
            cropEditor.image = await loadImage(dataUrl);
            cropEditor.frameX = 100;
            cropEditor.frameY = 100;
            cropEditor.frameSize = 440;
            cropEditor.minScale = Math.max(
                cropEditor.frameSize / cropEditor.image.width,
                cropEditor.frameSize / cropEditor.image.height
            );
            cropEditor.maxScale = cropEditor.minScale * 4;
            cropEditor.scale = cropEditor.minScale;
            cropEditor.x = cropEditor.frameX + (cropEditor.frameSize - cropEditor.image.width * cropEditor.scale) / 2;
            cropEditor.y = cropEditor.frameY + (cropEditor.frameSize - cropEditor.image.height * cropEditor.scale) / 2;
            cropEditor.dragging = false;
            syncAvatarCropZoom();
            constrainAvatarCrop();
            drawAvatarCropper();
            dom.avatarCropModal.hidden = false;

            return new Promise((resolve) => {
                cropEditor.resolve = resolve;
            });
        }

        function closeAvatarCropper(result) {
            dom.avatarCropModal.hidden = true;
            cropEditor.dragging = false;
            dom.avatarCropStage.classList.remove("is-dragging");
            if (cropEditor.resolve) {
                cropEditor.resolve(result);
                cropEditor.resolve = null;
            }
        }

        function applyAvatarCrop() {
            if (!cropEditor.image) {
                closeAvatarCropper(null);
                return;
            }

            const outputSize = 640;
            const outputCanvas = document.createElement("canvas");
            outputCanvas.width = outputSize;
            outputCanvas.height = outputSize;
            const outputContext = outputCanvas.getContext("2d");
            const ratio = outputSize / cropEditor.frameSize;
            outputContext.fillStyle = "#ffffff";
            outputContext.fillRect(0, 0, outputSize, outputSize);
            outputContext.drawImage(
                cropEditor.image,
                (cropEditor.x - cropEditor.frameX) * ratio,
                (cropEditor.y - cropEditor.frameY) * ratio,
                cropEditor.image.width * cropEditor.scale * ratio,
                cropEditor.image.height * cropEditor.scale * ratio
            );
            closeAvatarCropper(outputCanvas.toDataURL("image/jpeg", 0.92));
        }

        function syncAvatarCropZoom() {
            const progress = (cropEditor.scale - cropEditor.minScale) / Math.max(cropEditor.maxScale - cropEditor.minScale, 0.001);
            dom.avatarCropZoom.value = String(Math.min(4, Math.max(1, 1 + progress * 3)));
        }

        function handleAvatarCropZoom() {
            const progress = (Number(dom.avatarCropZoom.value) - 1) / 3;
            const nextScale = cropEditor.minScale + (cropEditor.maxScale - cropEditor.minScale) * progress;
            setAvatarCropScale(nextScale, cropEditor.canvas.width / 2, cropEditor.canvas.height / 2);
        }

        function handleAvatarCropWheel(event) {
            event.preventDefault();
            const rect = cropEditor.canvas.getBoundingClientRect();
            const x = (event.clientX - rect.left) * (cropEditor.canvas.width / rect.width);
            const y = (event.clientY - rect.top) * (cropEditor.canvas.height / rect.height);
            const factor = event.deltaY < 0 ? 1.06 : 0.94;
            setAvatarCropScale(cropEditor.scale * factor, x, y);
        }

        function setAvatarCropScale(nextScale, originX, originY) {
            const clampedScale = Math.min(cropEditor.maxScale, Math.max(cropEditor.minScale, nextScale));
            const ratio = clampedScale / cropEditor.scale;
            cropEditor.x = originX - (originX - cropEditor.x) * ratio;
            cropEditor.y = originY - (originY - cropEditor.y) * ratio;
            cropEditor.scale = clampedScale;
            constrainAvatarCrop();
            syncAvatarCropZoom();
            drawAvatarCropper();
        }

        function startAvatarCropDrag(event) {
            if (!cropEditor.image) {
                return;
            }
            cropEditor.dragging = true;
            cropEditor.lastX = event.clientX;
            cropEditor.lastY = event.clientY;
            dom.avatarCropStage.classList.add("is-dragging");
            dom.avatarCropStage.setPointerCapture(event.pointerId);
        }

        function moveAvatarCropDrag(event) {
            if (!cropEditor.dragging) {
                return;
            }
            const rect = cropEditor.canvas.getBoundingClientRect();
            const scaleX = cropEditor.canvas.width / rect.width;
            const scaleY = cropEditor.canvas.height / rect.height;
            cropEditor.x += (event.clientX - cropEditor.lastX) * scaleX;
            cropEditor.y += (event.clientY - cropEditor.lastY) * scaleY;
            cropEditor.lastX = event.clientX;
            cropEditor.lastY = event.clientY;
            constrainAvatarCrop();
            drawAvatarCropper();
        }

        function endAvatarCropDrag(event) {
            if (!cropEditor.dragging) {
                return;
            }
            cropEditor.dragging = false;
            dom.avatarCropStage.classList.remove("is-dragging");
            if (event.pointerId !== undefined) {
                try {
                    dom.avatarCropStage.releasePointerCapture(event.pointerId);
                } catch (error) {
                    // Pointer capture may already be released by the browser.
                }
            }
        }

        function constrainAvatarCrop() {
            const imageWidth = cropEditor.image.width * cropEditor.scale;
            const imageHeight = cropEditor.image.height * cropEditor.scale;
            const minX = cropEditor.frameX + cropEditor.frameSize - imageWidth;
            const minY = cropEditor.frameY + cropEditor.frameSize - imageHeight;
            cropEditor.x = Math.min(cropEditor.frameX, Math.max(minX, cropEditor.x));
            cropEditor.y = Math.min(cropEditor.frameY, Math.max(minY, cropEditor.y));
        }

        function drawAvatarCropper() {
            const context = cropEditor.ctx;
            context.clearRect(0, 0, cropEditor.canvas.width, cropEditor.canvas.height);
            context.fillStyle = document.body.dataset.theme === "light" ? "#eef8ff" : "#07111b";
            context.fillRect(0, 0, cropEditor.canvas.width, cropEditor.canvas.height);
            context.drawImage(
                cropEditor.image,
                cropEditor.x,
                cropEditor.y,
                cropEditor.image.width * cropEditor.scale,
                cropEditor.image.height * cropEditor.scale
            );
        }

        function resetState() {
            state = sanitizeState({ ...DEFAULT_STATE, theme: getDefaultTheme(), themeUserSet: false });
            state.avatarDataUrl = "";
            state.mapDataUrl = "";
            imageCache.avatar = null;
            imageCache.map = null;
            dom.avatarInput.value = "";
            dom.mapInput.value = "";
            localStorage.removeItem(STORAGE_KEY);
            applyTheme(state.theme);
            applyUiOpacity(state);
            updateModeToggle(state);
            populateForm(state);
            updateMediaStatus();
            const derived = deriveState(state);
            updateSummary(derived);
            renderKeepScreen(state, derived);
            persistState(state);
            setStatus("");
        }

        function toggleTheme() {
            state = readStateFromForm(state);
            state.theme = state.theme === "light" ? "dark" : "light";
            state.themeUserSet = true;
            applyTheme(state.theme);
            applyUiOpacity(state);
            updateModeToggle(state);
            persistState(state);
            setStatus("");
        }

        function toggleParticleMode() {
            state = readStateFromForm(state);
            const nextMode = state.uiMode === "particle" ? "simple" : "particle";
            state = applyModePreset(state, nextMode);
            applyUiOpacity(state);
            populateForm(state);
            updateModeToggle(state);
            persistState(state);
            setStatus("");
        }

        function toggleSettingsPanel() {
            const shouldOpen = dom.settingsPanel.hidden;
            dom.settingsPanel.hidden = !shouldOpen;
            dom.settingsToggleButton.setAttribute("aria-expanded", String(shouldOpen));
        }

        function applyModePreset(source, mode) {
            const preset = mode === "particle" ? PARTICLE_OPACITY : SIMPLE_OPACITY;
            return sanitizeState({
                ...source,
                uiMode: mode === "particle" ? "particle" : "simple",
                particlesEnabled: mode === "particle",
                ...preset,
                uiTuningVersion: UI_TUNING_VERSION
            });
        }

        function getDefaultTheme() {
            const hour = new Date().getHours();
            return hour >= 6 && hour < 24 ? "light" : "dark";
        }

        function applyTheme(theme) {
            const nextTheme = theme === "light" ? "light" : "dark";
            document.body.dataset.theme = nextTheme;
            if (dom.themeToggleButton) {
                dom.themeToggleButton.setAttribute("aria-pressed", nextTheme === "light" ? "true" : "false");
                dom.themeToggleButton.title = nextTheme === "light" ? "切换到黑暗模式" : "切换到白天模式";
            }
            if (dom.themeToggleLabel) {
                dom.themeToggleLabel.textContent = nextTheme === "light" ? "黑夜" : "白天";
            }
        }

        function applyUiOpacity(source) {
            OPACITY_FIELDS.forEach((key) => {
                document.documentElement.style.setProperty(`--${kebabCase(key)}`, String(source[key]));
            });
            document.documentElement.style.setProperty("--frost-blur", `${source.frostBlur}px`);
            updateOpacityLabels(source);
        }

        function updateModeToggle(source) {
            if (!dom.modeToggleButton) {
                return;
            }
            const isParticleMode = source.uiMode === "particle";
            document.body.dataset.uiMode = isParticleMode ? "particle" : "simple";
            dom.modeToggleButton.title = isParticleMode ? "切换到简洁模式" : "切换到粒子模式";
            dom.modeToggleButton.setAttribute("aria-pressed", isParticleMode ? "true" : "false");
        }

        function updateOpacityLabels(source) {
            OPACITY_FIELDS.forEach((key) => {
                if (dom[key] && dom[key].value !== String(source[key])) {
                    dom[key].value = String(source[key]);
                }
                if (dom[`${key}Value`]) {
                    dom[`${key}Value`].textContent = formatOpacityPercent(source[key]);
                }
            });
            if (dom.frostBlur && dom.frostBlur.value !== String(source.frostBlur)) {
                dom.frostBlur.value = String(source.frostBlur);
            }
            if (dom.frostBlurValue) {
                dom.frostBlurValue.textContent = `${Math.round(Number(source.frostBlur))}px`;
            }
            if (dom.particleSensitivity && dom.particleSensitivity.value !== String(source.particleSensitivity)) {
                dom.particleSensitivity.value = String(source.particleSensitivity);
            }
            if (dom.particleSensitivityValue) {
                dom.particleSensitivityValue.textContent = formatOpacityPercent(source.particleSensitivity);
            }
        }

        function adjustOpacityPreset(mode) {
            state = readStateFromForm(state);
            if (mode === "reset") {
                const preset = state.uiMode === "particle" ? PARTICLE_OPACITY : SIMPLE_OPACITY;
                state = sanitizeState({ ...state, ...preset });
            } else {
                const delta = mode === "clear" ? -0.08 : 0.08;
                state = sanitizeState({
                    ...state,
                    uiTuningVersion: UI_TUNING_VERSION,
                    opacityOverlay: state.opacityOverlay + delta,
                    opacityGrid: state.opacityGrid + delta,
                    opacityPanel: state.opacityPanel + delta,
                    opacityGlow: state.opacityGlow + delta,
                    opacityShadow: state.opacityShadow + delta,
                    opacityCard: state.opacityCard + delta,
                    opacityInput: state.opacityInput + delta * 0.5,
                    opacityPreview: state.opacityPreview + delta,
                    frostBlur: state.frostBlur + (mode === "clear" ? -4 : 4)
                });
            }
            applyUiOpacity(state);
            populateForm(state);
            persistState(state);
            setStatus("");
        }

        function formatOpacityPercent(value) {
            return `${Math.round(Number(value) * 100)}%`;
        }

        function kebabCase(value) {
            return value.replace(/[A-Z]/g, (letter) => `-${letter.toLowerCase()}`);
        }

        function deriveState(source) {
            const totalSeconds = source.durationHours * 3600 + source.durationMinutes * 60 + source.durationSeconds;
            const totalMinutes = totalSeconds / 60;
            const pace = calculatePace(source.durationHours, source.durationMinutes, source.durationSeconds, source.distance);
            const calories = calculateCalories(source.distance, source.weight);
            const steps = calculateSteps(source.cadence, totalMinutes);
            const timeInfo = calculateTimeInfo(source.runDate, source.startTime, totalSeconds);

        function drawTrackRoute(context, x, y, width, height) {
            const fieldX = x + 435;
            const fieldY = y + 144;
            const fieldWidth = 238;
            const fieldHeight = 336;
            const fieldRadius = 116;

            context.save();
            fillRoundRect(context, fieldX, fieldY, fieldWidth, fieldHeight, 120, "rgba(214, 233, 185, 0.86)");

            const centerX = fieldX + fieldWidth / 2;
            const centerY = fieldY + fieldHeight / 2;
            const radiusX = 106;
            const radiusY = 206;

            const strokeColors = ["#00d0d4", "#2fc5ff", "#16cfa0", "#0ec7a1"];
            const angleOffsets = [0, 0.02, -0.015, 0.035];
            const radiusOffsets = [0, -4, 6, 2];

            strokeColors.forEach((color, index) => {
                context.strokeStyle = color;
                context.globalAlpha = index === 0 ? 0.9 : 0.62;
                context.lineWidth = index === 0 ? 8 : 6;
                context.lineCap = "round";
                context.beginPath();
                for (let i = 0; i <= 100; i += 1) {
                    const angle = (Math.PI * 2 * i) / 100 + angleOffsets[index];
                    const wobbleX = radiusOffsets[index] * Math.sin(i * 0.15 + index);
                    const wobbleY = radiusOffsets[index] * Math.cos(i * 0.11 + index);
                    const px = centerX + (radiusX + wobbleX) * Math.cos(angle);
                    const py = centerY + (radiusY + wobbleY) * Math.sin(angle);
                    if (i === 0) {
                        context.moveTo(px, py);
                    } else {
                        context.lineTo(px, py);
                    }
                }
                context.stroke();
            });

            drawMarker(context, centerX - 104, centerY - 18, "#28cf77");
            drawMarker(context, centerX - 96, centerY + 42, "#ff6a66");
            context.restore();
        }

        function drawCroppedAvatar(context, image, centerX, centerY, radius) {
            const size = radius * 2;
            const zoom = clampNumber(state.avatarZoom, DEFAULT_STATE.avatarZoom, 1, 3, 2);
            const offsetXRatio = clampNumber(state.avatarOffsetX, DEFAULT_STATE.avatarOffsetX, -100, 100, 0) / 100;
            const offsetYRatio = clampNumber(state.avatarOffsetY, DEFAULT_STATE.avatarOffsetY, -100, 100, 0) / 100;
            const ratio = Math.max(size / image.width, size / image.height) * zoom;
            const drawWidth = image.width * ratio;
            const drawHeight = image.height * ratio;
            const baseX = centerX - radius + (size - drawWidth) / 2;
            const baseY = centerY - radius + (size - drawHeight) / 2;
            const maxShiftX = Math.max(0, (drawWidth - size) / 2);
            const maxShiftY = Math.max(0, (drawHeight - size) / 2);
            context.drawImage(image, baseX - offsetXRatio * maxShiftX, baseY - offsetYRatio * maxShiftY, drawWidth, drawHeight);
        }

        function drawPBBadge(context, centerX, centerY, ribbonText) {

        function fillRoundRect(context, x, y, width, height, radius, fillStyle) {
            context.save();
            context.fillStyle = fillStyle;
            clipRoundRect(context, x, y, width, height, radius);
            context.fill();
            context.restore();
        }

        function clipRoundRect(context, x, y, width, height, radius) {
            const clampedRadius = Math.min(radius, width / 2, height / 2);
            context.beginPath();
            context.moveTo(x + clampedRadius, y);
            context.lineTo(x + width - clampedRadius, y);
            context.quadraticCurveTo(x + width, y, x + width, y + clampedRadius);
            context.lineTo(x + width, y + height - clampedRadius);
            context.quadraticCurveTo(x + width, y + height, x + width - clampedRadius, y + height);
            context.lineTo(x + clampedRadius, y + height);
            context.quadraticCurveTo(x, y + height, x, y + height - clampedRadius);
            context.lineTo(x, y + clampedRadius);
            context.quadraticCurveTo(x, y, x + clampedRadius, y);
            context.closePath();
        }

        function drawCoverImage(context, image, x, y, width, height) {
            const ratio = Math.max(width / image.width, height / image.height);
            const drawWidth = image.width * ratio;
            const drawHeight = image.height * ratio;
            const offsetX = x + (width - drawWidth) / 2;
            const offsetY = y + (height - drawHeight) / 2;
            context.drawImage(image, offsetX, offsetY, drawWidth, drawHeight);
        }

        function fitText(context, text, maxWidth) {
            const source = (text || "").trim();
            if (!source) {
                return "";
            }
            if (context.measureText(source).width <= maxWidth) {
                return source;
            }
            let output = source;
            while (output.length > 0 && context.measureText(`${output}…`).width > maxWidth) {
                output = output.slice(0, -1);
            }
            return output ? `${output}…` : source.slice(0, 1);
        }

        function selectDistanceFontSize(distanceText) {
            if (distanceText.length >= 7) {
                return 126;
            }
            if (distanceText.length >= 6) {
                return 138;
            }
            return 152;
        }

        function calculatePace(hours, minutes, seconds, distance) {
            if (distance <= 0) {
                return "0'00\"";
            }
            const totalMinutes = hours * 60 + minutes + seconds / 60;
            const pacePerKm = totalMinutes / distance;
            const paceMinutes = Math.floor(pacePerKm);
            let paceSeconds = Math.round((pacePerKm - paceMinutes) * 60);
            if (paceSeconds >= 60) {
                return `${paceMinutes + 1}'00"`;
            }
            return `${paceMinutes}'${String(paceSeconds).padStart(2, "0")}"`;
        }

        function calculateCalories(distance, weight = 65) {
            if (distance <= 0) {
                return 0;
            }
            return Math.round(weight * distance * 1.036);
        }

        function calculateSteps(cadence, totalMinutes) {
            return Math.round(cadence * totalMinutes);
        }

        function calculateTimeInfo(runDate, startTime, totalSeconds) {
            const safeDate = /^\d{4}-\d{2}-\d{2}$/.test(runDate) ? runDate : DEFAULT_STATE.runDate;
            const safeTime = /^\d{2}:\d{2}$/.test(startTime) ? startTime : DEFAULT_STATE.startTime;
            const baseDate = new Date(`${safeDate}T${safeTime}:00`);
            if (Number.isNaN(baseDate.getTime())) {
                return {
                    dateSlash: safeDate.replace(/-/g, "/"),
                    startTime: safeTime,
                    endTime: safeTime
                };
            }
            const endDate = new Date(baseDate.getTime() + totalSeconds * 1000);
            return {
                dateSlash: formatDateSlash(baseDate),
                startTime: formatTimeOfDay(baseDate),
                endTime: formatTimeOfDay(endDate)
            };
        }

        function formatTimeOfDay(date) {
            return [date.getHours(), date.getMinutes()].map((value) => String(value).padStart(2, "0")).join(":");
        }

        function formatDateSlash(date) {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, "0");
            const day = String(date.getDate()).padStart(2, "0");
            return `${year}/${month}/${day}`;
        }

        function formatDuration(hours, minutes, seconds) {
            return [hours, minutes, seconds].map((value) => String(value).padStart(2, "0")).join(":");
        }

        function formatDistance(distance) {
            return Number(distance).toFixed(2);
        }

        function formatInteger(value) {
            return Math.round(value).toLocaleString("zh-CN");
        }

        function formatEditableNumber(value, digits) {
            return Number(value).toFixed(digits).replace(/\.0$/, "");
        }

        function sanitizeState(raw) {

            return {

                startTime: sanitizeTime(raw.startTime, DEFAULT_STATE.startTime),
                durationHours: clampInteger(raw.durationHours, DEFAULT_STATE.durationHours, 0, 23),
                durationMinutes: clampInteger(raw.durationMinutes, DEFAULT_STATE.durationMinutes, 0, 59),
                durationSeconds: clampInteger(raw.durationSeconds, DEFAULT_STATE.durationSeconds, 0, 59),
                distance: clampNumber(raw.distance, DEFAULT_STATE.distance, 0, 999, 2),
                city: sanitizeText(raw.city, DEFAULT_STATE.city, 10),
                weather: sanitizeText(raw.weather, DEFAULT_STATE.weather, 6),
                temperature: clampInteger(raw.temperature, DEFAULT_STATE.temperature, -20, 50),
                locationName: DEFAULT_STATE.locationName,
                weight: clampNumber(raw.weight, DEFAULT_STATE.weight, 30, 200, 1),
                cadence: clampInteger(raw.cadence, DEFAULT_STATE.cadence, 0, 300),
                trainingLoad: clampInteger(raw.trainingLoad, DEFAULT_STATE.trainingLoad, 0, 999),
                averageHeartRate: clampInteger(raw.averageHeartRate, DEFAULT_STATE.averageHeartRate, 0, 260),
                showPB: false,
                pbAchievementText: "",
                showNotice: true,

                useScreenshotTemplate: true,
                fontFamily: DEFAULT_STATE.fontFamily,
                fontScale: DEFAULT_STATE.fontScale,
                avatarZoom: clampNumber(raw.avatarZoom, DEFAULT_STATE.avatarZoom, 1, 3, 2),
                avatarOffsetX: clampInteger(raw.avatarOffsetX, DEFAULT_STATE.avatarOffsetX, -100, 100),
                avatarOffsetY: clampInteger(raw.avatarOffsetY, DEFAULT_STATE.avatarOffsetY, -100, 100),
                theme: raw.themeUserSet && (raw.theme === "light" || raw.theme === "dark") ? raw.theme : getDefaultTheme(),
                themeUserSet: Boolean(raw.themeUserSet),
                uiMode: useSavedTuning && raw.uiMode === "particle" ? "particle" : DEFAULT_STATE.uiMode,
                particlesEnabled: useSavedTuning ? raw.particlesEnabled !== false : DEFAULT_STATE.particlesEnabled,
                uiTuningVersion: UI_TUNING_VERSION,
                opacityOverlay: clampNumber(tuningSource.opacityOverlay, DEFAULT_STATE.opacityOverlay, 0, 1, 2),
                opacityGrid: clampNumber(tuningSource.opacityGrid, DEFAULT_STATE.opacityGrid, 0, 1, 2),
                opacityPanel: clampNumber(tuningSource.opacityPanel, DEFAULT_STATE.opacityPanel, 0, 1, 2),
                opacityGlow: clampNumber(tuningSource.opacityGlow, DEFAULT_STATE.opacityGlow, 0, 1, 2),
                opacityShadow: clampNumber(tuningSource.opacityShadow, DEFAULT_STATE.opacityShadow, 0, 1, 2),
                opacityCard: clampNumber(tuningSource.opacityCard, DEFAULT_STATE.opacityCard, 0, 1, 2),
                opacityInput: clampNumber(tuningSource.opacityInput, DEFAULT_STATE.opacityInput, 0, 1, 2),
                opacityPreview: clampNumber(tuningSource.opacityPreview, DEFAULT_STATE.opacityPreview, 0, 1, 2),
                frostBlur: clampInteger(tuningSource.frostBlur, DEFAULT_STATE.frostBlur, 0, 30),
                particleSensitivity: clampNumber(tuningSource.particleSensitivity, DEFAULT_STATE.particleSensitivity, 0, 2, 2),
                avatarDataUrl: typeof raw.avatarDataUrl === "string" ? raw.avatarDataUrl : "",
                mapDataUrl: typeof raw.mapDataUrl === "string" ? raw.mapDataUrl : ""
            };
        }

        function sanitizeText(value, fallback, maxLength) {
            const text = typeof value === "string" ? value.trim() : "";
            if (!text) {
                return fallback;
            }
            return text.slice(0, maxLength);
        }

        function sanitizeOptionalText(value, fallback, maxLength) {
            if (typeof value !== "string") {
                return fallback;
            }
            return value.trim().slice(0, maxLength);
        }

        function sanitizeDate(value, fallback) {
            return /^\d{4}-\d{2}-\d{2}$/.test(value) ? value : fallback;
        }

        function sanitizeTime(value, fallback) {
            return /^\d{2}:\d{2}$/.test(value) ? value : fallback;
        }

        function clampInteger(value, fallback, min, max) {
            const number = Number.parseInt(value, 10);
            if (!Number.isFinite(number)) {
                return fallback;
            }
            return Math.min(max, Math.max(min, number));
        }

        function clampNumber(value, fallback, min, max, digits) {
            const number = Number.parseFloat(value);
            if (!Number.isFinite(number)) {
                return fallback;
            }
            const nextValue = Math.min(max, Math.max(min, number));
            return Number(nextValue.toFixed(digits));
        }

        function restoreState() {
            try {
                const rawValue = localStorage.getItem(STORAGE_KEY);
                if (!rawValue) {
                    return sanitizeState(DEFAULT_STATE);
                }
                return sanitizeState(JSON.parse(rawValue));
            } catch (error) {
                console.warn("restoreState failed", error);
                return sanitizeState(DEFAULT_STATE);
            }
        }

        function persistState(nextState) {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(nextState));
            } catch (error) {
                console.warn("persistState failed", error);
                try {
                    const shallowState = { ...nextState, avatarDataUrl: "", mapDataUrl: "" };
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(shallowState));
                    setStatus("图片素材体积过大，已只保存文本草稿。", "warning");
                } catch (finalError) {
                    console.warn("persist fallback failed", finalError);
                }
            }
        }
