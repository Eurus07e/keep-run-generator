            dom.avatarStatus.textContent = "";
            dom.mapStatus.textContent = "";
            if (dom.avatarEditButton) {
                dom.avatarEditButton.hidden = !state.avatarDataUrl;
            }
        }

        function debounce(fn, wait) {
            let timer = null;
            return (...args) => {
                window.clearTimeout(timer);
                timer = window.setTimeout(() => fn(...args), wait);
            };
        }

        function setStatus(message, tone = "info") {
            if (!dom.statusMessage) {
                return;
            }
            dom.statusMessage.textContent = message;
            if (message) {
                dom.statusMessage.dataset.tone = tone;
            } else {
                delete dom.statusMessage.dataset.tone;
            }
        }

        async function loadImage(dataUrl) {
            return new Promise((resolve, reject) => {
                const image = new Image();
                image.onload = () => resolve(image);
                image.onerror = reject;
                image.src = dataUrl;
            });
        }

        async function setCachedImage(key, dataUrl) {
            if (!dataUrl) {
                imageCache[key] = null;
                return;
            }
            imageCache[key] = await loadImage(dataUrl);
        }

        async function loadStaticTemplateImage() {
            if (window.KEEP_TEMPLATE_IMAGE_DATA_URL) {
                imageCache.template = await loadImage(window.KEEP_TEMPLATE_IMAGE_DATA_URL);
                imageCache.templateExportSafe = true;
                return;
            }

            try {
                const dataUrl = await loadLocalAssetAsDataUrl(TEMPLATE_IMAGE_PATH);
                imageCache.template = await loadImage(dataUrl);
                imageCache.templateExportSafe = true;
            } catch (error) {
                console.warn("template image data-url load failed, falling back to file image", error);
                try {
                    imageCache.template = await loadImage(TEMPLATE_IMAGE_PATH);
                    imageCache.templateExportSafe = false;
                } catch (fallbackError) {
                    console.warn("template image load failed", fallbackError);
                    imageCache.template = null;
                    imageCache.templateExportSafe = false;
                }
            }
        }

        async function loadLocalAssetAsDataUrl(url) {
            return new Promise((resolve, reject) => {
                const request = new XMLHttpRequest();
                request.open("GET", url, true);
                request.responseType = "blob";
                request.onload = () => {
                    if ((request.status !== 0 && request.status < 200) || request.status >= 300) {
                        reject(new Error(`Asset request failed with status ${request.status}`));
                        return;
                    }

                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(request.response);
                };
                request.onerror = reject;
                request.send();
            });
        }

        async function resizeImageFile(file, options) {
            const fileDataUrl = await readFileAsDataUrl(file);
            const image = await loadImage(fileDataUrl);
            const ratio = Math.min(options.maxWidth / image.width, options.maxHeight / image.height, 1);
            const targetWidth = Math.max(1, Math.round(image.width * ratio));
            const targetHeight = Math.max(1, Math.round(image.height * ratio));
            const bufferCanvas = document.createElement("canvas");
            bufferCanvas.width = targetWidth;
            bufferCanvas.height = targetHeight;
            const bufferContext = bufferCanvas.getContext("2d");
            bufferContext.drawImage(image, 0, 0, targetWidth, targetHeight);
            const mimeType = file.type === "image/png" ? "image/png" : "image/jpeg";
            return bufferCanvas.toDataURL(mimeType, options.quality);
        }

        async function readFileAsDataUrl(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function exportPng() {
            refreshAll({ persist: true });
            const link = document.createElement("a");
            link.download = `keep-run-${state.runDate || DEFAULT_STATE.runDate}.png`;
            try {
                link.href = canvas.toDataURL("image/png", 1);
                link.click();
                setStatus("图片已保存。", "success");
            } catch (error) {
                console.warn("exportPng failed", error);
                setStatus("浏览器阻止保存图片，请刷新后重试。", "error");
            }
        }

        function initParticleBackground() {
            const particleCanvas = document.getElementById("particleCanvas");
            if (!particleCanvas) {
                return;
            }

            const particleContext = particleCanvas.getContext("2d");
            const particles = [];
            const mouse = { x: -9999, y: -9999, active: false };
            let width = 0;
            let height = 0;
            let pixelRatio = 1;
            let animationFrame = 0;

            const resizeParticles = () => {
                pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
                width = window.innerWidth;
                height = window.innerHeight;
                particleCanvas.width = Math.round(width * pixelRatio);
                particleCanvas.height = Math.round(height * pixelRatio);
                particleCanvas.style.width = `${width}px`;
                particleCanvas.style.height = `${height}px`;
                particleContext.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

                const isSmallScreen = width < 720;
                const density = isSmallScreen ? 2400 : 1300;
                const minParticles = isSmallScreen ? 260 : 820;
                const maxParticles = isSmallScreen ? 560 : 1800;
                const targetCount = Math.min(maxParticles, Math.max(minParticles, Math.round((width * height) / density)));
                particles.length = 0;
                for (let index = 0; index < targetCount; index += 1) {
                    particles.push(createParticle(width, height));
                }
            };

            const drawParticles = () => {
                if (state.particlesEnabled === false) {
                    particleContext.clearRect(0, 0, width, height);
                    animationFrame = window.requestAnimationFrame(drawParticles);
                    return;
                }

                const isLightTheme = document.body.dataset.theme === "light";
                particleContext.clearRect(0, 0, width, height);
                particleContext.fillStyle = isLightTheme ? "#eef8ff" : "#0a0a0a";
                particleContext.fillRect(0, 0, width, height);

                const cellSize = 120;
                const grid = new Map();

                particles.forEach((particle) => {
                    const dx = mouse.x - particle.x;
                    const dy = mouse.y - particle.y;
                    const distance = Math.hypot(dx, dy);
                    const sensitivity = Math.max(0, Math.min(2, Number(state.particleSensitivity) || 0));

                    if (mouse.active && distance < 190) {
                        const force = (190 - distance) / 190;
                        particle.vx += (dx / Math.max(distance, 1)) * force * 0.035 * sensitivity;
                        particle.vy += (dy / Math.max(distance, 1)) * force * 0.035 * sensitivity;
                        particle.glow = Math.min(1, particle.glow + force * 0.08 * sensitivity);
                    } else {
                        particle.glow *= 0.94;
                    }

                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vx *= 0.985;
                    particle.vy *= 0.985;

                    if (particle.x < -20) particle.x = width + 20;
                    if (particle.x > width + 20) particle.x = -20;
                    if (particle.y < -20) particle.y = height + 20;
                    if (particle.y > height + 20) particle.y = -20;

                    const cellX = Math.floor(particle.x / cellSize);
                    const cellY = Math.floor(particle.y / cellSize);
                    const key = `${cellX}:${cellY}`;
                    if (!grid.has(key)) {
                        grid.set(key, []);
                    }
                    grid.get(key).push(particle);
                });

                particleContext.lineWidth = 1;
                particles.forEach((particle) => {
                    const cellX = Math.floor(particle.x / cellSize);
                    const cellY = Math.floor(particle.y / cellSize);
                    for (let offsetX = -1; offsetX <= 1; offsetX += 1) {
                        for (let offsetY = -1; offsetY <= 1; offsetY += 1) {
                            const neighbors = grid.get(`${cellX + offsetX}:${cellY + offsetY}`) || [];
                            neighbors.forEach((neighbor) => {
                                if (neighbor.id <= particle.id) {
                                    return;
                                }
                                const distance = Math.hypot(particle.x - neighbor.x, particle.y - neighbor.y);
                                if (distance > 118) {
                                    return;
                                }
                                const alpha = (1 - distance / 118) * (isLightTheme ? 0.16 : 0.18);
                                particleContext.strokeStyle = isLightTheme
                                    ? `rgba(0, 108, 168, ${alpha})`
                                    : `rgba(0, 217, 255, ${alpha})`;
                                particleContext.beginPath();
                                particleContext.moveTo(particle.x, particle.y);
                                particleContext.lineTo(neighbor.x, neighbor.y);
                                particleContext.stroke();
                            });
                        }
                    }
                });

                particles.forEach((particle) => {
                    const glow = particle.glow;
                    const radius = particle.size + glow * 1.8;
                    const alpha = particle.alpha + glow * 0.42;
                    if (isLightTheme) {
                        particleContext.fillStyle = particle.color === "white"
                            ? `rgba(0, 88, 132, ${alpha * 0.7})`
                            : `rgba(0, 145, 210, ${alpha})`;
                    } else {
                        particleContext.fillStyle = particle.color === "white"
                            ? `rgba(255, 255, 255, ${alpha})`
                            : `rgba(0, 217, 255, ${alpha})`;
                    }
                    particleContext.beginPath();
                    particleContext.arc(particle.x, particle.y, radius, 0, Math.PI * 2);
                    particleContext.fill();
                });

                animationFrame = window.requestAnimationFrame(drawParticles);
            };

            window.addEventListener("resize", resizeParticles);
            window.addEventListener("mousemove", (event) => {
                mouse.x = event.clientX;
                mouse.y = event.clientY;
                mouse.active = true;
            });
            window.addEventListener("mouseleave", () => {
                mouse.active = false;
            });

            resizeParticles();
            window.cancelAnimationFrame(animationFrame);
            drawParticles();
        }

        function createParticle(width, height) {
            return {
                id: Math.random(),
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.28,
                vy: (Math.random() - 0.5) * 0.28,
                size: Math.random() * 1.35 + 0.35,
                alpha: Math.random() * 0.34 + 0.18,
                color: Math.random() > 0.82 ? "white" : "cyan",
                glow: 0
            };
        }

        window.calculatePace = calculatePace;
        window.calculateCalories = calculateCalories;
        window.restoreState = restoreState;
        window.persistState = persistState;
        window.renderKeepScreen = renderKeepScreen;
        window.renderCurrentKeepScreen = () => renderKeepScreen(state);
        window.exportPng = exportPng;
    </script>
</body>
</html>
